<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DJ Oz</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
</head>

<body>

<!-- CONTADOR -->
<div id="contador" class="contador">👁️ Visitas: 1</div>

<header class="hero">
    <img id="logo" class="logo-img">
    <p id="descricao"></p>
    
    <a href="https://wa.me/5511947685370" class="btn">Contratar Agora</a>
</header>

<nav>
    <a href="#sobre">Sobre</a>
    <a href="#sets">Sets</a>
    <a href="#eventos">Eventos</a>
    <a href="#contato">Contato</a>
</nav>

<section id="sobre">
    <h2>Sobre</h2>
    <p>DJ profissional especializado em eventos.</p>
</section>

<section id="sets">
    <h2>Sets & Mixagens</h2>
</section>

<section id="eventos">
    <h2>Eventos</h2>
</section>

<section id="contato" class="contato">
    <h2>Contratar DJ</h2>

    <!-- FORMULÁRIO PROFISSIONAL -->
    <form 
        action="https://formsubmit.co/osmar.dj.oz@gmail.com" 
        method="POST" 
        target="hidden_iframe"
        onsubmit="mostrarMensagem()"
    >
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_subject" value="Novo orçamento DJ Oz">
        <input type="hidden" name="_template" value="table">
        <input type="hidden" name="_autoresponse" value="Recebemos seu pedido! Em breve entraremos em contato.">

        <input type="text" name="name" placeholder="Seu nome" required>
        <input type="email" name="email" placeholder="Seu email" required>
        <textarea name="message" placeholder="Detalhes do evento" required></textarea>

        <button type="submit">Enviar</button>
    </form>

    <!-- IFRAME OCULTO (IMPRESCINDÍVEL) -->
    <iframe name="hidden_iframe" style="display:none;"></iframe>

    <!-- MENSAGEM -->
    <p id="statusEnvio"></p>

</section>

<a href="https://wa.me/5511947685370" class="whatsapp">💬</a>

<footer>
    <p>© 2026 DJ Oz</p>
</footer>

<script src="script.js"></script>

</body>
</html>
