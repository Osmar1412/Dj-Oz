<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DJ Oz</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
</head>

<body>

<header class="hero">
    <img id="logo" class="logo-img">
    <p id="descricao"></p>

    <a href="https://wa.me/5511947865370" class="btn">Contratar Agora</a>

    <!-- CONTADOR -->
    <div class="contador-box">
        <span id="contador">👁️ Carregando...</span>
    </div>
</header>

<nav>
    <a href="#sobre">Sobre</a>
    <a href="#sets">Sets</a>
    <a href="#eventos">Eventos</a>
    <a href="#contato">Contato</a>
</nav>

<section id="sobre">
    <h2>Sobre</h2>
    <p>DJ profissional especializado em eventos.</p>
</section>

<section id="sets">
    <h2>Sets & Mixagens</h2>
</section>

<section id="eventos">
    <h2>Eventos</h2>
</section>

<section id="contato" class="contato">
    <h2>Contratar DJ</h2>

    <form id="formDJ">
        <input type="text" name="name" placeholder="Seu nome" required>
        <input type="email" name="email" placeholder="Seu email" required>
        <input type="tel" name="whatsapp" placeholder="Seu WhatsApp" required>
        <textarea name="message" placeholder="Detalhes do evento" required></textarea>

        <button type="submit">Enviar</button>
    </form>

    <p id="statusEnvio"></p>
</section>

<!-- ✅ WHATSAPP OFICIAL (CORRIGIDO) -->
<a href="https://wa.me/5511947865370" class="whatsapp" target="_blank">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
</a>

<!-- ✅ RODAPÉ MELHORADO (SEM REMOVER NADA) -->
<footer class="footer">
    <div class="footer-content">

        <div class="footer-item">
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">
            <p>WhatsApp: (11) 94786-5370</p>
        </div>

        <div class="footer-item">
            <img src="https://cdn-icons-png.flaticon.com/512/732/732200.png">
            <p>Email: osmar.dj.oz@gmail.com</p>
        </div>

        <p>🎧 DJ Oz Eventos</p>
        <p>© 2026 Todos os direitos reservados</p>

    </div>
</footer>

<script src="script.js"></script>

</body>
</html>
